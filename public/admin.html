<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAISON Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0908;--bg2:#141210;--bg3:#1C1A17;--text:#F0EBE3;--text2:#A89F94;--text3:#6B6259;
  --accent:#C4856C;--gold:#B69D74;--sage:#8DA87B;--red:#C4604C;
  --glass:rgba(240,235,227,0.04);--glass-border:rgba(240,235,227,0.08);
  --serif:'Cormorant Garamond',serif;--sans:'Outfit',system-ui,sans-serif}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-weight:300;-webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-card{width:100%;max-width:360px;padding:2.5rem;background:var(--bg3);border:1px solid var(--glass-border);border-radius:20px;text-align:center;position:relative}
.login-card::before{content:'';position:absolute;top:-1px;left:25%;right:25%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.login-brand{font-family:var(--serif);font-size:1.3rem;letter-spacing:.25em;text-transform:uppercase;margin-bottom:.3rem}
.login-sub{font-size:.75rem;color:var(--text3);margin-bottom:2rem}
.login-input{width:100%;padding:.8rem 1rem;background:var(--bg);border:1px solid var(--glass-border);border-radius:10px;font-size:.9rem;color:var(--text);outline:none;margin-bottom:1rem;transition:border-color .3s;text-align:center;letter-spacing:.15em}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:.85rem;background:var(--accent);color:var(--bg);border-radius:10px;font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;transition:all .3s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,133,108,.3)}
.login-error{color:var(--red);font-size:.75rem;margin-top:.8rem;display:none}

/* ── Dashboard ── */
.dashboard{display:none;padding:1.5rem;max-width:1200px;margin:0 auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.dash-brand{font-family:var(--serif);font-size:1.1rem;letter-spacing:.2em;text-transform:uppercase}
.dash-brand span{color:var(--text3);font-size:.7rem;letter-spacing:.12em;display:block;font-family:var(--sans);margin-top:.2rem}
.dash-actions{display:flex;gap:.5rem;align-items:center}
.dash-actions a,.dash-actions button{padding:.45rem 1rem;border:1px solid var(--glass-border);border-radius:100px;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);transition:all .3s;text-decoration:none}
.dash-actions a:hover,.dash-actions button:hover{border-color:var(--text2);color:var(--text)}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;margin-bottom:2rem}
.stat{padding:1.2rem;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;text-align:center}
.stat-num{font-family:var(--serif);font-size:2rem;font-weight:400;line-height:1}
.stat-label{font-size:.65rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:.3rem}
.stat.pending .stat-num{color:var(--gold)}
.stat.sent .stat-num{color:var(--sage)}
.stat.rejected .stat-num{color:var(--red)}

/* ── Filters ── */
.filters{display:flex;gap:.4rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-btn{padding:.4rem .9rem;border:1px solid var(--glass-border);border-radius:100px;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);transition:all .3s}
.filter-btn:hover{color:var(--text2);border-color:var(--text3)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg)}

/* ── Table ── */
.table-wrap{overflow-x:auto;border:1px solid var(--glass-border);border-radius:14px;background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:500;text-align:left;padding:.8rem 1rem;border-bottom:1px solid var(--glass-border);white-space:nowrap}
td{padding:.8rem 1rem;border-bottom:1px solid rgba(240,235,227,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--glass)}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:100px;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.badge.pending{background:rgba(182,157,116,.15);color:var(--gold)}
.badge.sent{background:rgba(141,168,123,.15);color:var(--sage)}
.badge.approved{background:rgba(141,168,123,.1);color:var(--sage)}
.badge.rejected{background:rgba(196,96,76,.15);color:var(--red)}
.proof-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid var(--glass-border);transition:transform .2s}
.proof-thumb:hover{transform:scale(1.1)}
.action-btns{display:flex;gap:.3rem}
.action-btns button{padding:.3rem .6rem;border-radius:6px;font-size:.6rem;letter-spacing:.05em;text-transform:uppercase;transition:all .2s}
.btn-send{background:rgba(141,168,123,.15);color:var(--sage)}
.btn-send:hover{background:rgba(141,168,123,.3)}
.btn-reject{background:rgba(196,96,76,.1);color:var(--red)}
.btn-reject:hover{background:rgba(196,96,76,.2)}
.btn-del{background:rgba(107,98,89,.1);color:var(--text3)}
.btn-del:hover{background:rgba(107,98,89,.25)}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:.85rem}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.show{display:flex}
.modal-img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain}
.modal-close{position:fixed;top:1rem;right:1rem;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;z-index:1000;transition:background .2s}
.modal-close:hover{background:rgba(255,255,255,.2)}

@media(max-width:600px){
  table{font-size:.7rem}
  th,td{padding:.6rem .5rem}
  .dash-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<!-- Dashboard -->
<div class="dashboard" id="dashboard" style="display:block">
  <div class="dash-header">
    <div class="dash-brand">Maison <span>Review Submissions</span></div>
    <div class="dash-actions">
      <a href="/">View Site</a>
      <button onclick="loadData()">Refresh</button>
    </div>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-num" id="sTotal">-</div><div class="stat-label">Total</div></div>
    <div class="stat pending"><div class="stat-num" id="sPending">-</div><div class="stat-label">Pending</div></div>
    <div class="stat sent"><div class="stat-num" id="sSent">-</div><div class="stat-label">Sent</div></div>
    <div class="stat rejected"><div class="stat-num" id="sRejected">-</div><div class="stat-label">Rejected</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="pending">Pending</button>
    <button class="filter-btn" data-f="approved">Approved</button>
    <button class="filter-btn" data-f="sent">Sent</button>
    <button class="filter-btn" data-f="rejected">Rejected</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Proof</th><th>Name</th><th>Email</th><th>Platform</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Image Modal -->
<div class="modal-overlay" id="modal">
  <button class="modal-close" onclick="closeModal()">&times;</button>
  <img class="modal-img" id="modalImg" alt="Proof">
</div>

<script>
let currentFilter = 'all';

// Load on start
loadData();

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.f;
    loadData();
  });
});

async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  return r.json();
}

async function loadData() {
  const [stats, subs] = await Promise.all([
    api('/api/admin/stats'),
    api('/api/admin/submissions?status=' + currentFilter)
  ]);
  if (!stats || !subs) return;

  document.getElementById('sTotal').textContent = stats.total;
  document.getElementById('sPending').textContent = stats.pending;
  document.getElementById('sSent').textContent = stats.sent;
  document.getElementById('sRejected').textContent = stats.rejected;

  const tbody = document.getElementById('tbody');
  if (!subs.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No submissions found</td></tr>';
    return;
  }
  tbody.innerHTML = subs.map(s => `
    <tr>
      <td>${s.proof_filename ? `<img class="proof-thumb" src="/uploads/${s.proof_filename}" onclick="openModal('/uploads/${s.proof_filename}')" alt="proof">` : '-'}</td>
      <td>${esc(s.name) || '<span style="color:var(--text3)">--</span>'}</td>
      <td>${esc(s.email)}</td>
      <td style="text-transform:capitalize">${esc(s.platform)}</td>
      <td style="white-space:nowrap;color:var(--text2)">${fmtDate(s.created_at)}</td>
      <td><span class="badge ${s.status}">${s.status}</span></td>
      <td>
        <div class="action-btns">
          ${s.status === 'pending' ? `<button class="btn-send" onclick="updateStatus(${s.id},'sent')">Send</button>` : ''}
          ${s.status === 'pending' ? `<button class="btn-reject" onclick="updateStatus(${s.id},'rejected')">Reject</button>` : ''}
          <button class="btn-del" onclick="deleteSub(${s.id})">Del</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function updateStatus(id, status) {
  await api('/api/admin/update', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, status })
  });
  loadData();
}

async function deleteSub(id) {
  if (!confirm('Delete this submission?')) return;
  await api('/api/admin/delete/' + id, { method: 'DELETE' });
  loadData();
}

function openModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmtDate(s) {
  if (!s) return '-';
  const d = new Date(s + 'Z');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}
</script>
</body>
</html>
